name: Upload Package

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Create a GitHub Release even if the version has not changed'
        type: boolean
        default: false
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version.txt changed
        id: check
        run: |
          if [[ "${{ github.event.inputs.force_release }}" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [[ -z "${{ github.event.before }}" ]]; then
            # workflow_dispatch: no push range available, fall back to last-commit diff
            if git diff HEAD^ HEAD --name-only 2>/dev/null | grep -q "^version.txt$"; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            # Initial push to branch — no previous commit to diff against, treat as changed
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff "${{ github.event.before }}..${{ github.sha }}" --name-only 2>/dev/null | grep -q "^version.txt$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  conan-upload:
    if: github.repository == 'instinkt900/moth_editor'
    needs: check-version
    runs-on: ${{ matrix.os == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        os: [windows, linux]

    steps:
    - name: Install system dependencies (Linux)
      if: matrix.os == 'linux'
      run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Build Conan package and upload to Artifactory
      run: |
        conan remote add artifactory ${{ secrets.ARTIFACTORY_URL }}
        conan remote login artifactory ci -p ${{ secrets.ARTIFACTS_TOKEN }}
        conan create . --profile conan/profiles/${{ matrix.os }}_profile --build=missing -s build_type=Release
        conan upload moth_ui_editor --confirm --remote artifactory

  build-release:
    if: github.repository == 'instinkt900/moth_editor' && needs.check-version.outputs.changed == 'true'
    needs: check-version
    runs-on: ${{ matrix.os == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        os: [windows, linux]

    steps:
    - name: Install system dependencies (Linux)
      if: matrix.os == 'linux'
      run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Install dependencies
      run: |
        conan remote add artifactory ${{ secrets.ARTIFACTORY_URL }}
        conan remote login artifactory ci -p ${{ secrets.ARTIFACTS_TOKEN }}
        conan install . --profile conan/profiles/${{ matrix.os }}_profile --build=missing -s build_type=Release --output-folder build/release

    - name: Configure and build
      shell: bash
      run: |
        cmake -B build/release \
          -DCMAKE_TOOLCHAIN_FILE=build/release/generators/conan_toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build build/release --config Release

    - name: Install to staging directory
      run: cmake --install build/release --config Release --prefix staging

    - name: Read version
      id: version
      shell: bash
      run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

    - name: Archive binaries (Linux)
      if: matrix.os == 'linux'
      run: tar czf moth_editor-${{ steps.version.outputs.version }}-linux.tar.gz -C staging .

    - name: Archive binaries (Windows)
      if: matrix.os == 'windows'
      shell: pwsh
      run: Compress-Archive -Path staging\* -DestinationPath moth_editor-${{ steps.version.outputs.version }}-windows.zip

    - name: Upload archive as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: moth_editor-${{ matrix.os }}
        path: moth_editor-${{ steps.version.outputs.version }}-*
        retention-days: 1

  tag-and-release:
    if: github.repository == 'instinkt900/moth_editor' && needs.check-version.outputs.changed == 'true'
    needs: [check-version, build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Create version tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: ${{ steps.version.outputs.version }}
          tag_exists_error: false
          force_push_tag: true

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "moth_editor ${{ steps.version.outputs.version }}"
          files: release-assets/*
          generate_release_notes: true
